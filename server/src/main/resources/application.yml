server:
  port: 8080

spring:
  application:
    name: dolgodola

  config:
    import: optional:file:server.env[.properties]

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update 
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true

  devtools:
    livereload:
      enabled: true
    restart:
      enabled: true

